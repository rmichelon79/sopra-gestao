const MONTHS_PICKER=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

function createMonthPicker(containerId, currentVal, onchange){
  // currentVal: "YYYY-MM" string
  const container=document.getElementById(containerId);
  if(!container)return;
  
  let selDate=currentVal?new Date(currentVal+'-01T12:00:00'):new Date();
  let displayYear=selDate.getFullYear();
  
  function fmt(y,m){return y+'-'+String(m+1).padStart(2,'0');}
  function fmtLabel(v){if(!v)return '—';const d=new Date(v+'-01T12:00:00');return MONTHS_PICKER[d.getMonth()]+'/'+String(d.getFullYear()).slice(2);}
  
  function render(){
    const curVal=fmt(selDate.getFullYear(),selDate.getMonth());
    const monthsHTML=MONTHS_PICKER.map((m,i)=>{
      const v=fmt(displayYear,i);
      const sel=v===curVal;
      return `<button class="mspicker-m${sel?' selected':''}" onclick="mspickSelect('${containerId}',${displayYear},${i})">${m}</button>`;
    }).join('');
    container.innerHTML=`
      <div class="mspicker">
        <div class="mspicker-btn" onclick="mspickToggle('${containerId}')">
          <span>${fmtLabel(curVal)}</span><span style="font-size:9px;color:var(--fa)">▾</span>
        </div>
        <div class="mspicker-drop hidden" id="msdrop-${containerId}">
          <div class="mspicker-nav">
            <button class="mspicker-arr" onclick="mspickYear('${containerId}',-1)">‹</button>
            <span class="mspicker-year">${displayYear}</span>
            <button class="mspicker-arr" onclick="mspickYear('${containerId}',1)">›</button>
          </div>
          <div class="mspicker-grid">${monthsHTML}</div>
        </div>
      </div>`;
    // Store state
    container._mpYear=displayYear;
    container._mpVal=curVal;
    container._mpOnchange=onchange;
  }
  render();
}

function mspickToggle(cid){
  const drop=document.getElementById('msdrop-'+cid);
  if(!drop)return;
  // Close all other dropdowns first
  document.querySelectorAll('.mspicker-drop').forEach(d=>{if(d.id!=='msdrop-'+cid)d.classList.add('hidden');});
  drop.classList.toggle('hidden');
}

function mspickYear(cid,delta){
  const container=document.getElementById(cid);
  if(!container)return;
  container._mpYear=(container._mpYear||new Date().getFullYear())+delta;
  // Re-render without losing selection
  const prevVal=container._mpVal;
  const prevCb=container._mpOnchange;
  const displayYear=container._mpYear;
  const MONTHS_PICKER2=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const monthsHTML=MONTHS_PICKER2.map((m,i)=>{
    const v=displayYear+'-'+String(i+1).padStart(2,'0');
    return `<button class="mspicker-m${v===prevVal?' selected':''}" onclick="mspickSelect('${cid}',${displayYear},${i})">${m}</button>`;
  }).join('');
  const drop=document.getElementById('msdrop-'+cid);
  if(drop){
    drop.querySelector('.mspicker-year').textContent=displayYear;
    drop.querySelector('.mspicker-grid').innerHTML=monthsHTML;
  }
}

function mspickSelect(cid,year,monthIdx){
  const container=document.getElementById(cid);
  if(!container)return;
  const val=year+'-'+String(monthIdx+1).padStart(2,'0');
  container._mpVal=val;
  const cb=container._mpOnchange;
  // Close dropdown
  const drop=document.getElementById('msdrop-'+cid);
  if(drop)drop.classList.add('hidden');
  // Update button label
  const MONTHS_PICKER2=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const btn=container.querySelector('.mspicker-btn span');
  if(btn)btn.textContent=MONTHS_PICKER2[monthIdx]+'/'+String(year).slice(2);
  // Update all month buttons
  container.querySelectorAll('.mspicker-m').forEach(b=>{b.classList.remove('selected');});
  const btns=container.querySelectorAll('.mspicker-m');
  if(btns[monthIdx])btns[monthIdx].classList.add('selected');
  // Trigger callback
  if(cb)cb(val);
}

async function sbUploadPDF(file, path){

  const res = await fetch(SB_URL+'/storage/v1/object/documentos/'+path, {
    method: 'POST',
    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer '+SB_KEY,
      'Content-Type': file.type||'application/pdf',
      'x-upsert': 'true'

    body: file
  });

function moveFase(empId, idx, dir){
  const e=D.empreendimentos.find(x=>x.id===empId);if(!e)return;
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=e.fases.length)return;

function executarGerarEventos(){
  const inicio=document.getElementById('ge-inicio')?.value;
  const fim=document.getElementById('ge-fim')?.value;
  const substituir=document.getElementById('ge-substituir')?.checked;
  if(!inicio||!fim){alert('Selecione as datas');return;}
  if(inicio>fim){alert('Data inicial deve ser anterior à final');return;}
  const cads=D.cadencias||[];
  if(!cads.length){alert('Nenhuma cadência configurada');return;}
  if(!D.rituais)D.rituais=[];
  const dInicio=new Date(inicio+'T12:00:00');
  const dFim=new Date(fim+'T12:00:00');
  const MESES_ABBR=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  // Remove eventos futuros não realizados gerados por cadência (se substituir)
  if(substituir){
    D.rituais=D.rituais.filter(r=>{
      if(!r.cadenciaId)return true; // não é da cadência, mantém
      if(r.done)return true; // realizado, mantém
      // Parse data do ritual (mes='Jan/26', data='15')
      if(!r.mes||!r.data)return true;
      const [mAbbr,yy]=r.mes.split('/');
      const monthIdx=MESES_ABBR.indexOf(mAbbr);
      if(monthIdx<0)return true;
      const ano=2000+parseInt(yy);
      const dia=parseInt(r.data);
      const dRit=new Date(ano,monthIdx,dia,12,0,0);
      // Mantém se for antes do início (não está na janela de regeneração)
      if(dRit<dInicio)return true;
      return false; // remove
    });
  }
  let added=0;
  cads.forEach(cad=>{
    const dates=gerarDatasParaCadencia(cad,dInicio,dFim);
    dates.forEach(d=>{
      const mes=MESES_ABBR[d.getMonth()]+'/'+String(d.getFullYear()).slice(2);
      const data=String(d.getDate());
      // Evita duplicar evento já realizado
      const exists=D.rituais.some(r=>r.cadenciaId===cad.id&&r.mes===mes&&r.data===data);
      if(exists)return;
      D.rituais.push({
        id:uid(),
        cadenciaId:cad.id,
        nome:cad.nome,
        mes,data,
        tipo:({semanal:'Semanal',quinzenal:'Quinzenal',mensal:'Mensal',trimestral:'Trimestral'})[cad.frequencia]||'Mensal',
        desc:[cad.hora?'às '+cad.hora:'',cad.participantes].filter(Boolean).join(' · '),
        done:false,
        camada:2,
      });
      added++;
    });
  });
  saveData();closeModal();renderRituais();
  toast(added+' evento'+(added===1?'':'s')+' gerado'+(added===1?'':'s'));
}

function gerarDatasParaCadencia(cad,inicio,fim){
  const dates=[];
  const cur=new Date(inicio);
  if(cad.frequencia==='semanal'||cad.frequencia==='quinzenal'){
    // Ajusta para o próximo dia da semana certo
    const diaAlvo=cad.diaSemana||1;
    while(cur.getDay()!==diaAlvo){cur.setDate(cur.getDate()+1);}
    const step=cad.frequencia==='semanal'?7:14;
    while(cur<=fim){
      dates.push(new Date(cur));
      cur.setDate(cur.getDate()+step);
    }
  } else if(cad.frequencia==='mensal'){
    const dia=Math.min(cad.diaMes||1,28);
    let m=new Date(inicio.getFullYear(),inicio.getMonth(),dia,12,0,0);
    if(m<inicio)m.setMonth(m.getMonth()+1);
    while(m<=fim){
      dates.push(new Date(m));
      m.setMonth(m.getMonth()+1);
    }
  } else if(cad.frequencia==='trimestral'){
    // Início dos trimestres: Jan, Abr, Jul, Out
    const meses=[0,3,6,9];
    let ano=inicio.getFullYear();
    while(ano<=fim.getFullYear()+1){
      meses.forEach(m=>{
        const d=new Date(ano,m,1,12,0,0);
        if(d>=inicio&&d<=fim)dates.push(d);
      });
      ano++;
    }
  }
  return dates;
}

async function salvarUploadDoc(docId,key){
  const fileEl=document.getElementById('ud-file');
  if(!fileEl||!fileEl.files.length){alert('Selecione um arquivo PDF');return;}
  const file=fileEl.files[0];
  if(file.type!=='application/pdf'){alert('Apenas arquivos PDF');return;}
  const doc=(D.docs||[]).find(x=>x.id===docId);if(!doc)return;
  const tamanho=file.size>1024*1024?(file.size/1024/1024).toFixed(1)+' MB':(file.size/1024).toFixed(0)+' KB';

  // Collect form values BEFORE closing modal
  let useKey=key;
  if(doc.tipo==='anual'){
    const ano=document.getElementById('ud-ano')?.value||String(new Date().getFullYear());
    useKey=ano;
  } else if(doc.tipo==='multiplo'){
    const label=document.getElementById('ud-label')?.value?.trim()||file.name.replace('.pdf','');
    useKey=label;
  } else if(doc.tipo==='mensal'){
    const mes=document.getElementById('ud-mes')?.value;
    const yy=document.getElementById('ud-ano')?.value;
    if(!mes){alert('Selecione o mes');return;}
    useKey=mes+'/'+yy;
  }

  toast('Enviando '+file.name+'…');
  closeModal();

  // Upload to Supabase Storage
  const path=docId+'/'+(useKey||Date.now()).toString().replace(/\//g,'_').replace(/\s+/g,'_')+'.pdf';
  let url=null;
  try{
    url=await sbUploadPDF(file,path);
  }catch(e){console.error('Upload error:',e);}

  if(!url){
    alert('Falha no upload. Verifique a conexão com o Supabase Storage.');
    return;
  }

  const entry={nome:file.name,tamanho,data:todayStr(),autor:SESSION.name,storageUrl:url,base64:null};

  if(doc.tipo==='multiplo'){
    if(!Array.isArray(doc.entradas))doc.entradas=[];
    doc.entradas.push({...entry,label:useKey});
  } else {
    if(!doc.entradas||Array.isArray(doc.entradas))doc.entradas={};
    doc.entradas[useKey]=entry;
  }

  saveData();
  if(typeof sbPushData==='function')sbPushData();
  renderDocs();
  toast('✓ PDF enviado — '+file.name);
}

function abrirDoc(docId,key,tipo){
  const doc=(D.docs||[]).find(x=>x.id===docId);if(!doc)return;
  let entry;
  if(tipo==='multiplo'){entry=(doc.entradas||[])[key];}
  else{entry=(doc.entradas||{})[key];}
  if(!entry){alert('Documento não encontrado');return;}
  if(entry.storageUrl){window.open(entry.storageUrl,'_blank');return;}
  if(entry.base64){
    const win=window.open('','_blank');
    win.document.write('<!DOCTYPE html><html><body style="margin:0"><embed src="'+entry.base64+'" type="application/pdf" width="100%" height="100%" style="height:100vh"></body></html>');
    win.document.close();return;
  }
  alert('PDF não encontrado');
}

      .map-header .sub{font-size:13px;color:#7a7166;letter-spacing:.04em;text-transform:uppercase}
      .objs-grid{display:grid;grid-template-columns:repeat(${Math.min(objs.length,2)},1fr);gap:18px;max-width:1800px;margin:0 auto}
      .obj-card{border-radius:14px;padding:18px;border:2px solid;display:flex;flex-direction:column;gap:12px}
      .obj-head{display:flex;align-items:flex-start;gap:12px}
      .obj-icon{font-size:32px;line-height:1}
      .obj-title{flex:1}
      .obj-num{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;opacity:.7;margin-bottom:3px}
      .obj-name{font-family:'DM Serif Display',serif;font-size:21px;font-weight:400;line-height:1.2}
      .areas-list{display:flex;flex-direction:column;gap:8px}
      .area-block{background:rgba(255,255,255,.7);border-radius:10px;padding:11px 13px}
      .area-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
      .area-badge{font-size:10px;font-weight:700;letter-spacing:.06em;padding:2px 8px;border-radius:4px}
      .area-name{flex:1;font-size:13px;font-weight:600;line-height:1.25}
      .krs-list{display:flex;flex-direction:column;gap:3px;margin-top:5px}
      .kr{font-size:11px;line-height:1.35;padding-left:13px;position:relative;color:#3a3530}
      .kr::before{content:'';position:absolute;left:3px;top:5px;width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.4}
      .ini{font-size:11px;line-height:1.35;padding-left:13px;position:relative;color:#3a3530;font-style:italic}
      .ini::before{content:'→';position:absolute;left:0;top:0;font-size:10px;font-weight:700;font-style:normal}
      .obj-pct{font-family:'DM Mono',monospace;font-size:18px;font-weight:600;padding:5px 12px;border-radius:6px;line-height:1;flex-shrink:0;align-self:center}
      .area-pct{font-family:'DM Mono',monospace;font-size:11px;font-weight:600;color:#5a5046;background:rgba(255,255,255,.6);padding:2px 7px;border-radius:4px;flex-shrink:0}
      .kr{display:flex;align-items:flex-start;gap:6px}
      .kr-label,.ini-label{flex:1}
      .kr-pct{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;color:#7a7166;flex-shrink:0;line-height:1.4}
      .footer{text-align:center;margin-top:32px;padding-top:14px;border-top:1px solid #d6cfbe;font-size:11px;color:#999;letter-spacing:.05em}
      .print-btn{position:fixed;top:16px;right:16px;background:#1f1d1a;color:#F7F5F0;border:none;padding:10px 18px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.15);z-index:100}
      .print-btn:hover{background:#000}
      @media print {
        body{padding:12px;background:#fff}
        .print-btn{display:none}
        .obj-card{break-inside:avoid;page-break-inside:avoid}
        .map-header{margin-bottom:18px}
        .objs-grid{gap:12px}
      }
      @page{size:A3 landscape;margin:8mm}
    </style>
  </head><body>
    <button class="print-btn" onclick="window.print()">🖨 Imprimir / Salvar PDF</button>
    <div class="map-header">
      <h1>Mapa de OKRs Sopra · 2026</h1>
      <div class="sub">${objs.length} objetivos · ${objs.reduce((s,o)=>s+o.areas.length,0)} áreas · ${objs.reduce((s,o)=>s+o.areas.reduce((sa,a)=>sa+a.krs.length,0),0)} KRs · Completude geral ${fmtPct(avg(objs.map(objPctMap).filter(v=>v!==null)))} · ${today}</div>
    </div>
    <div class="objs-grid">`;

  objs.forEach((obj,i)=>{
    const c=objColors[i%objColors.length];
    const opc=objPctMap(obj);
    html+=`<div class="obj-card" style="background:${c.bg};border-color:${c.border};color:${c.ink}">
      <div class="obj-head">
        <div class="obj-icon">${obj.icon||'🎯'}</div>
        <div class="obj-title">
          <div class="obj-num">Objetivo ${obj.num}</div>
          <div class="obj-name">${obj.title}</div>
        </div>
        <div class="obj-pct" style="background:${c.border};color:#fff">${fmtPct(opc)}</div>
      </div>
      <div class="areas-list">`;

    obj.areas.forEach(area=>{
      const ac=areaColors[area.area]||{bg:'#666',ink:'#fff'};
      const apc=areaPctMap(area);
      html+=`<div class="area-block">
        <div class="area-head">
          <div class="area-badge" style="background:${ac.bg};color:${ac.ink}">${area.area}</div>
          <div class="area-name">${area.title}</div>
          <div class="area-pct">${fmtPct(apc)}</div>
        </div>
        <div class="krs-list">`;
      area.krs.forEach(kr=>{
        html+=`<div class="kr"><span class="kr-label">${kr.label}</span><span class="kr-pct">${fmtPct(krPctMap(kr))}</span></div>`;
      });
      (area.iniciativas||[]).forEach(ini=>{
        html+=`<div class="ini"><span class="ini-label">${ini.descricao}</span><span class="kr-pct">${fmtPct(iniPctMap(ini))}</span></div>`;
      });
      html+=`</div></div>`;
    });

    html+=`</div></div>`;
  });

  html+=`</div>
    <div class="footer">SOPRA · GESTÃO ESTRATÉGICA · Documento gerado em ${today}</div>
  </body></html>`;

  const win=window.open('','_blank');
  win.document.write(html);
  win.document.close();
}


function nav(page,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-it').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  if(el)el.classList.add('active');
  Object.values(chartInstances).forEach(c=>{try{c.destroy()}catch{}});
  Object.keys(chartInstances).forEach(k=>delete chartInstances[k]);
  ({dashboard:renderDashboard,okrs:renderOkrs,kpis:renderKpis,emp:renderEmps,rituais:renderRituais,pessoas:renderPessoas,usuarios:renderUsuarios,docs:renderDocs,ia:renderIA,iniciativas:renderIniciativas})[page]?.();
}

  startApp();
} else {

}
